server {
    listen 20000;
    server_name localhost;

    # dist нужно разместить на nginx-сервере, например в /usr/local/var/www/tdwa02-02/dist
    root /usr/local/var/www/tdwa02-02/dist;
    index index.html;

    location = /TDW02-02.html {
        rewrite ^ /index.html last;
    }

    location = /TDWA02-02.html {
        rewrite ^ /index.html last;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
