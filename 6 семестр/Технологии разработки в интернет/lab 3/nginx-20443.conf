server {
    listen 20443 ssl;
    server_name localhost;

    ssl_certificate "/Users/yanpaulovich/Documents/fit/ТРВП/lab 3/certs/localhost.crt";
    ssl_certificate_key "/Users/yanpaulovich/Documents/fit/ТРВП/lab 3/certs/localhost.key";
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 5m;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/local/var/www;
    index index.html;

    location /api/Save-JSON {
        proxy_pass http://localhost:40000/NGINX-test;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /TDWA03-01.html {
        rewrite ^ /tdwa03-01/index.html last;
    }

    location /tdwa03-01/ {
        alias /usr/local/var/www/tdwa03-01/dist/;
        index index.html;
    }
}
